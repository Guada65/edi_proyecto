<!DOCTYPE hmtl>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>MendozaKids</title>
        <link rel="stylesheet" href="style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
        
    <body>
        <header-mendoza></header-mendoza>

        <div class="carrusel">
            <div class="carrusel-contenedor">
                <img src="fcarrusel/uvita.jpg" alt="uvas">
                <img src="fcarrusel/gato.png" alt="gato">
                <img src="fcarrusel/montaña.jpg" alt="montaña">
                <img src="fcarrusel/portones.jpeg" alt="montaña">
                <img src="fcarrusel/antiguo.PNG" alt="antes">
            </div>
        </div>

        <div class="menu-principal">
            <menu-mendoza></menu-mendoza>
        </div>

        <banner-mendoza categoria="inicio"></banner-mendoza>

        <div class="sabias-contenedor">
            <div class="s-titulo">¿Sabías que...?</div>
            <div class="s-t-g">
                <p>Mendoza limita con Chile. El "Paso Internacional Los Libertadores" une ambos países.</p>
            </div>
            <div class="s-t-n">
                <p>En la montaña viven cóndores, aves que pueden vivir ¡más de 70 años!</p>
            </div>
            <div class="s-t-c">
                <p>El semáforo para ciegos fue inventado por un mendocino, Mario Dávila.</p>
            </div>

        </div>

        <footer class="footer-inicio">
            <p>¡Descubrí Mendoza!</p>
            <p>Tierra del buen sol y del buen vino</p>
        </footer>

        <script src="script.js"></script>
    </body>
</html>
